# fly.toml app configuration file generated for pocketbase-api on 2026-05-07T04:53:52+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pocketbase-api'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  HTTP_ADDR = ':8080'
  MONGO_DB = 'pocketbase'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
