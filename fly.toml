app            = "pokedex-api"
primary_region = "sin"          # Singapore — closest to Thailand

[build]
  dockerfile = "Dockerfile"

[env]
  HTTP_ADDR  = ":8080"
  MONGO_DB   = "pokedex"
  # MONGO_URI and CORS_ORIGIN are set as secrets:
  # fly secrets set MONGO_URI="mongodb+srv://..." CORS_ORIGIN="https://pokedex-web.pages.dev"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "stop"   # free-tier friendly: stops after inactivity
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
